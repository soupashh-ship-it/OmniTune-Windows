name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Install VLC runtime for packaging
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\VideoLAN\VLC\libvlc.dll")) {
            choco install vlc --yes --no-progress
          }
          if (-not (Test-Path "C:\Program Files\VideoLAN\VLC\libvlc.dll")) {
            throw "VLC/libVLC runtime was not installed at the expected path."
          }

      - name: Build validated Windows release
        shell: pwsh
        env:
          VLC_HOME: C:\Program Files\VideoLAN\VLC
        run: .\scripts\release\build-windows-release.ps1

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $releaseDir = "build\release\windows"
          $required = @(
            (Get-ChildItem $releaseDir -Filter "OmniTune-Setup-*-windows-x64.exe" -File | Select-Object -First 1),
            (Get-ChildItem $releaseDir -Filter "OmniTune-*-windows-x64.msi" -File | Select-Object -First 1),
            (Get-Item "$releaseDir\SHA256SUMS.txt"),
            (Get-Item "$releaseDir\release-manifest.json")
          )
          if ($required.Count -ne 4 -or $required -contains $null) {
            throw "Expected release artifacts were not found in $releaseDir."
          }
          foreach ($file in $required) {
            Copy-Item -LiteralPath $file.FullName -Destination artifacts -Force
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnitune-windows-installers
          path: artifacts/*

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @"
          Automated Windows installer build for $env:GITHUB_REF_NAME.

          Includes EXE, MSI, SHA-256 checksums, and release manifest.

          Verify clean-machine installation, VLC runtime behavior, playback, downloads, offline playback, uninstall/reinstall, and SmartScreen behavior before promoting this release.
          "@

          $isPrerelease = $env:GITHUB_REF_NAME -match "(?i)(rc|alpha|beta|preview)"
          $files = Get-ChildItem artifacts -File | ForEach-Object { $_.FullName }
          if (gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null) {
            gh release upload $env:GITHUB_REF_NAME @files --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            $args = @(
              "release", "create", $env:GITHUB_REF_NAME
            ) + $files + @(
              "--repo", $env:GITHUB_REPOSITORY,
              "--title", "OmniTune Windows $env:GITHUB_REF_NAME",
              "--notes", $notes
            )
            if ($isPrerelease) {
              $args += "--prerelease"
            }
            gh @args
          }
