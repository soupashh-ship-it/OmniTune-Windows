name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-desktop:
    name: Windows desktop build and tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Show Gradle version
        run: .\gradlew.bat --version

      - name: Run desktop tests
        run: .\gradlew.bat :composeApp:desktopTest --stacktrace

      - name: Build project without live provider test
        run: .\gradlew.bat build -x :innertube:test --stacktrace
